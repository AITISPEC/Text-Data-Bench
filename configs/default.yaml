pipeline:
  prefer_gpu: true
  llm_model_path: "models/Qwen2-500M-Instruct-Q8_0.gguf"
  llm_ctx: 8192
  batch_size: 500

filters:
  min_length: 10
  max_length: 10000
  remove_empty: true

dedup:
  exact: true
  fuzzy: true
  fuzzy_threshold: 0.85
  num_perm: 128

balance:
  strategy: "stratified"  # stratified | uniform
  group_col: "category"   # optional
  seed: 42

output:
  format: "parquet"
  report_path: "output/report.md"