pipeline:
  prefer_gpu: true
  text_col: null
filters:
  min_length: 10
  max_length: 10000
  remove_empty: true
dedup:
  exact: true
  fuzzy: true
  fuzzy_threshold: 0.85
  num_perm: 128
balance:
  strategy: "stratified"
  group_col: null
  seed: 42
output:
  format: "parquet"
  report_path: "output/report.md"
logging:
  level: "INFO"
  json_format: false
